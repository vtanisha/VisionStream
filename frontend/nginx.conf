server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # MJPEG is one endless multipart response. Buffering it would stall the stream
        # in nginx until the buffer filled, so the video would arrive in lurches.
        proxy_buffering off;
        chunked_transfer_encoding off;
        proxy_read_timeout 24h;
    }
}
